<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
      }
      :root { --primary: #6C63FF;
        --tertiary: #8B5CF6;
        --font-sans: Inter, sans-serif;
        --ring: #00F5FF;
        --card: #12121A;
        --muted: #2A2A35;
        --primary-foreground: #ffffff;
        --background: #09090b;
        --destructive: #ef4444;
        --foreground: #ffffff;
        --radius: 0.75rem;
        --secondary-foreground: #09090b;
        --input: #2A2A35;
        --border: #2A2A35;
        --card-foreground: #ffffff;
        --font-heading: Inter, sans-serif;
        --muted-foreground: #A1A1AA;
        --secondary: #00F5FF;
        --accent: #00F5FF; }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background flex flex-col relative text-foreground font-sans">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-border bg-background/80 backdrop-blur z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <iconify-icon icon="lucide:audio-waveform" class="text-secondary text-2xl drop-shadow-[0_0_8px_rgba(0,245,255,0.8)]"></iconify-icon>
            <span class="font-heading font-bold tracking-wider">MAESTRO AI</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="px-2 py-1 text-[10px] font-bold bg-primary/20 text-primary border border-primary/50 rounded-sm tracking-widest uppercase">Jailbreak</span>
            <span class="px-2 py-1 text-[10px] font-bold bg-secondary/20 text-secondary border border-secondary/50 rounded-sm tracking-widest uppercase">Pro</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-32">
        <!-- Hero Section / Active Audio -->
        <div class="bg-card border border-border rounded-xl p-4 shadow-lg relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent pointer-events-none"></div>
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-sm text-muted-foreground font-medium uppercase tracking-wider">Now Playing</h2>
                    <h3 class="text-lg font-bold mt-1">Cyberpunk Ambience.wav</h3>
                </div>
                <button class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-primary-foreground shadow-[0_0_15px_rgba(108,99,255,0.5)]">
                    <iconify-icon icon="lucide:pause" class="text-xl"></iconify-icon>
                </button>
            </div>
            <!-- Waveform visualization -->
            <div class="h-16 flex items-end gap-1 justify-center opacity-80 mb-2">
                <div class="w-1.5 bg-secondary/40 rounded-t-full h-1/4"></div>
                <div class="w-1.5 bg-secondary/60 rounded-t-full h-1/2"></div>
                <div class="w-1.5 bg-secondary/80 rounded-t-full h-3/4"></div>
                <div class="w-1.5 bg-secondary rounded-t-full h-full shadow-[0_0_8px_rgba(0,245,255,0.8)]"></div>
                <div class="w-1.5 bg-secondary/80 rounded-t-full h-4/5"></div>
                <div class="w-1.5 bg-secondary/60 rounded-t-full h-1/2"></div>
                <div class="w-1.5 bg-secondary/40 rounded-t-full h-1/3"></div>
                <div class="w-1.5 bg-secondary/40 rounded-t-full h-1/4"></div>
                <div class="w-1.5 bg-secondary/60 rounded-t-full h-2/5"></div>
                <div class="w-1.5 bg-secondary/80 rounded-t-full h-3/5"></div>
                <div class="w-1.5 bg-secondary/40 rounded-t-full h-1/4"></div>
                <div class="w-1.5 bg-secondary/60 rounded-t-full h-1/3"></div>
                <div class="w-1.5 bg-secondary/40 rounded-t-full h-1/5"></div>
                <div class="w-1.5 bg-secondary/20 rounded-t-full h-1/6"></div>
                <div class="w-1.5 bg-secondary/20 rounded-t-full h-1/6"></div>
            </div>
            <div class="flex justify-between text-xs font-mono text-muted-foreground">
                <span class="text-secondary">01:24</span>
                <span>03:45</span>
            </div>
        </div>

        <!-- Library Section -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-heading font-semibold text-lg">My Audio Library</h2>
                <button class="text-secondary text-sm flex items-center gap-1 bg-secondary/10 px-3 py-1.5 rounded-full">
                    <iconify-icon icon="lucide:filter"></iconify-icon> Filter
                </button>
            </div>

            <div class="space-y-3">
                <!-- Track Item 1 -->
                <div class="flex items-center gap-3 p-3 bg-muted/30 hover:bg-muted/50 border border-transparent hover:border-border rounded-lg transition-colors cursor-pointer group">
                    <div class="w-12 h-12 rounded bg-card flex items-center justify-center border border-border relative overflow-hidden">
                        <iconify-icon icon="lucide:music" class="text-muted-foreground"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-medium text-sm">Vocal_Stem_01_Raw.wav</h4>
                        <p class="text-xs text-muted-foreground font-mono mt-0.5">2.4 MB • 24-bit/48kHz</p>
                    </div>
                    <button class="p-2 text-muted-foreground hover:text-secondary">
                        <iconify-icon icon="lucide:more-vertical"></iconify-icon>
                    </button>
                </div>
                <!-- Track Item 2 -->
                <div class="flex items-center gap-3 p-3 bg-primary/5 border border-primary/20 hover:border-primary/50 rounded-lg transition-colors cursor-pointer group relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
                    <div class="w-12 h-12 rounded bg-card flex items-center justify-center border border-primary/30 relative overflow-hidden shadow-[0_0_10px_rgba(108,99,255,0.2)]">
                        <iconify-icon icon="lucide:sparkles" class="text-primary"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-medium text-sm text-primary">Acapella_Verse_Gen.wav</h4>
                        <p class="text-xs text-muted-foreground font-mono mt-0.5">AI Generated • 0:45</p>
                    </div>
                    <button class="p-2 text-muted-foreground hover:text-secondary">
                        <iconify-icon icon="lucide:more-vertical"></iconify-icon>
                    </button>
                </div>
                <!-- Track Item 3 -->
                <div class="flex items-center gap-3 p-3 bg-muted/30 hover:bg-muted/50 border border-transparent hover:border-border rounded-lg transition-colors cursor-pointer group">
                    <div class="w-12 h-12 rounded bg-card flex items-center justify-center border border-border relative overflow-hidden">
                        <iconify-icon icon="lucide:drum" class="text-muted-foreground"></iconify-icon>
                    </div>
                    <div class="flex-1">
                        <h4 class="font-medium text-sm">Drum_Loop_120bpm.mp3</h4>
                        <p class="text-xs text-muted-foreground font-mono mt-0.5">1.1 MB • 320kbps</p>
                    </div>
                    <button class="p-2 text-muted-foreground hover:text-secondary">
                        <iconify-icon icon="lucide:more-vertical"></iconify-icon>
                    </button>
                </div>
            </div>
            
            <button class="w-full mt-4 py-3 border border-dashed border-border rounded-lg text-muted-foreground flex items-center justify-center gap-2 hover:border-secondary hover:text-secondary transition-colors">
                <iconify-icon icon="lucide:plus"></iconify-icon>
                <span class="text-sm font-medium">Upload New Audio</span>
            </button>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="absolute bottom-0 left-0 right-0 bg-card/95 backdrop-blur border-t border-border flex justify-around py-3 px-2 pb-6 z-20">
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:sparkles" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">IA</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-secondary w-16 relative">
            <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-8 h-1 bg-secondary rounded-full shadow-[0_0_8px_rgba(0,245,255,0.8)]"></div>
            <iconify-icon icon="lucide:headphones" class="text-xl drop-shadow-[0_0_5px_rgba(0,245,255,0.5)]"></iconify-icon>
            <span class="text-[10px] font-medium">Audio</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:layers" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">Formules</span>
        </button>
    </nav>
</div>
</body></html>
