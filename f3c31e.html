<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
      }
      :root { --secondary-foreground: #94a3b8;
        --card: #0f172a;
        --primary: #0ea5e9;
        --radius: 1rem;
        --tertiary: #d946ef;
        --secondary: #1e293b;
        --border: #1e293b;
        --ring: #0ea5e9;
        --primary-foreground: #ffffff;
        --background: #020617;
        --input: #1e293b;
        --foreground: #f8fafc; }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background text-foreground flex flex-col relative font-sans overflow-hidden">
  <!-- Success Header -->
  <div class="pt-12 pb-8 px-6 text-center">
    <div class="relative inline-block mb-6">
      <div class="w-24 h-24 rounded-full bg-emerald-500/20 flex items-center justify-center animate-pulse">
        <div class="w-16 h-16 rounded-full bg-emerald-500 flex items-center justify-center shadow-[0_0_30px_rgba(16,185,129,0.4)]">
          <iconify-icon icon="lucide:check" class="text-4xl text-white"></iconify-icon>
        </div>
      </div>
      <!-- Floating Particles -->
      <div class="absolute -top-2 -right-2 w-4 h-4 bg-primary rounded-full animate-bounce"></div>
      <div class="absolute bottom-4 -left-4 w-3 h-3 bg-tertiary rounded-full animate-ping"></div>
    </div>
    <h1 class="text-3xl font-heading font-bold mb-2 bg-gradient-to-r from-emerald-400 to-primary bg-clip-text text-transparent">Build Complete!</h1>
    <p class="text-muted-foreground">SonicAI 2026 is ready for installation.</p>
  </div>

  <!-- Build Info Card -->
  <main class="flex-1 px-6 space-y-6">
    <div class="bg-card border border-border rounded-2xl p-6 shadow-xl relative overflow-hidden">
      <div class="flex items-center justify-between mb-6">
        <div>
          <p class="text-xs text-muted-foreground uppercase tracking-widest">Filename</p>
          <p class="font-mono text-sm font-semibold">SonicAI_2026_Pro_v1.0.apk</p>
        </div>
        <div class="px-3 py-1 bg-secondary rounded-lg border border-border">
          <p class="text-[10px] font-bold text-muted-foreground">84.2 MB</p>
        </div>
      </div>

      <div class="space-y-4">
        <div class="flex items-center gap-4 p-3 bg-background/50 rounded-xl border border-border/50">
          <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center">
            <iconify-icon icon="lucide:shield-check" class="text-xl text-primary"></iconify-icon>
          </div>
          <div>
            <p class="text-xs text-muted-foreground">Security Status</p>
            <p class="text-sm font-medium">Verified & Signed</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4 p-3 bg-background/50 rounded-xl border border-border/50">
          <div class="w-10 h-10 rounded-lg bg-tertiary/10 flex items-center justify-center">
            <iconify-icon icon="lucide:zap" class="text-xl text-tertiary"></iconify-icon>
          </div>
          <div>
            <p class="text-xs text-muted-foreground">Patch Applied</p>
            <p class="text-sm font-medium">Infinite Lifetime Subscription</p>
          </div>
        </div>

        <div class="flex items-center gap-4 p-3 bg-background/50 rounded-xl border border-border/50">
          <div class="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center">
            <iconify-icon icon="lucide:lock-open" class="text-xl text-emerald-500"></iconify-icon>
          </div>
          <div>
            <p class="text-xs text-muted-foreground">AI Engine</p>
            <p class="text-sm font-medium">Uncensored (Bypass Mode)</p>
          </div>
        </div>
      </div>

      <!-- QR Code Placeholder -->
      <div class="mt-8 flex flex-col items-center">
        <div class="p-4 bg-white rounded-2xl mb-4 shadow-inner">
          <iconify-icon icon="lucide:grid-3x3" class="text-8xl text-slate-900"></iconify-icon>
        </div>
        <p class="text-xs text-muted-foreground text-center">Scan to install directly on your device</p>
      </div>
    </div>

    <!-- Share Options -->
    <div class="flex gap-4">
      <button class="flex-1 py-4 bg-secondary rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-secondary/80 transition-colors">
        <iconify-icon icon="lucide:share-2"></iconify-icon>
        Share Link
      </button>
      <button class="flex-1 py-4 bg-secondary rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-secondary/80 transition-colors">
        <iconify-icon icon="lucide:copy"></iconify-icon>
        Copy Hash
      </button>
    </div>
  </main>

  <!-- Bottom Action -->
  <div class="p-6 pb-10">
    <button class="w-full py-4 bg-primary text-primary-foreground rounded-xl font-bold shadow-lg shadow-primary/30 flex items-center justify-center gap-3 hover:scale-[1.02] active:scale-[0.98] transition-all">
      <iconify-icon icon="lucide:download" class="text-xl"></iconify-icon>
      DOWNLOAD APK NOW
    </button>
  </div>

  <!-- Background Decoration -->
  <div class="fixed top-0 right-0 w-64 h-64 bg-primary/10 blur-[100px] rounded-full -z-10"></div>
  <div class="fixed bottom-0 left-0 w-64 h-64 bg-tertiary/10 blur-[100px] rounded-full -z-10"></div>
</div>
</body></html>
