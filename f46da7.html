<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
      }
      :root { --primary: #6C63FF;
        --tertiary: #8B5CF6;
        --font-sans: Inter, sans-serif;
        --ring: #00F5FF;
        --card: #12121A;
        --muted: #2A2A35;
        --primary-foreground: #ffffff;
        --background: #09090b;
        --destructive: #ef4444;
        --foreground: #ffffff;
        --radius: 0.75rem;
        --secondary-foreground: #09090b;
        --input: #2A2A35;
        --border: #2A2A35;
        --card-foreground: #ffffff;
        --font-heading: Inter, sans-serif;
        --muted-foreground: #A1A1AA;
        --secondary: #00F5FF;
        --accent: #00F5FF; }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background flex flex-col relative text-foreground font-sans">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-border bg-background/80 backdrop-blur z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <iconify-icon icon="lucide:download-cloud" class="text-secondary text-2xl drop-shadow-[0_0_8px_rgba(0,245,255,0.8)]"></iconify-icon>
            <span class="font-heading font-bold tracking-wider">DOWNLOADS</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="px-2 py-1 text-[10px] font-bold bg-primary/20 text-primary border border-primary/50 rounded-sm tracking-widest uppercase shadow-[0_0_8px_rgba(108,99,255,0.4)]">Jailbreak</span>
            <span class="px-2 py-1 text-[10px] font-bold bg-secondary/20 text-secondary border border-secondary/50 rounded-sm tracking-widest uppercase">Pro</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
        
        <!-- Storage Info -->
        <div class="bg-card border border-border rounded-xl p-4 shadow-sm relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-r from-secondary/5 to-transparent pointer-events-none"></div>
            <div class="flex justify-between items-end mb-2 relative z-10">
                <span class="text-sm font-medium">Local Storage</span>
                <span class="text-xs font-mono text-muted-foreground">4.2 GB / 10 GB</span>
            </div>
            <div class="w-full bg-input rounded-full h-2 overflow-hidden relative z-10">
                <div class="bg-gradient-to-r from-primary to-secondary h-full w-2/5 rounded-full shadow-[0_0_8px_rgba(0,245,255,0.5)]"></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 p-1 bg-input rounded-lg">
            <button class="flex-1 py-1.5 text-sm font-medium bg-background text-foreground rounded shadow-sm">All</button>
            <button class="flex-1 py-1.5 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Downloaded</button>
            <button class="flex-1 py-1.5 text-sm font-medium text-muted-foreground hover:text-foreground transition-colors">Generated</button>
        </div>

        <!-- File List -->
        <div class="space-y-3">
            <!-- Item 1 (Downloaded) -->
            <div class="flex items-center gap-3 p-3 bg-muted/30 hover:bg-muted/50 border border-transparent hover:border-border rounded-lg transition-colors cursor-pointer group">
                <div class="w-10 h-10 rounded bg-card flex items-center justify-center border border-border">
                    <iconify-icon icon="lucide:arrow-down-circle" class="text-muted-foreground group-hover:text-secondary transition-colors"></iconify-icon>
                </div>
                <div class="flex-1">
                    <h4 class="font-medium text-sm">Vocal_Stem_01_Raw.wav</h4>
                    <p class="text-xs text-muted-foreground font-mono mt-0.5">Downloaded • 2.4 MB</p>
                </div>
                <button class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center hover:bg-primary hover:text-primary-foreground transition-colors">
                    <iconify-icon icon="lucide:play" class="ml-0.5"></iconify-icon>
                </button>
            </div>

            <!-- Item 2 (Generated) -->
            <div class="flex items-center gap-3 p-3 bg-primary/5 border border-primary/20 hover:border-primary/40 rounded-lg relative overflow-hidden transition-colors cursor-pointer group">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-primary"></div>
                <div class="w-10 h-10 rounded bg-card flex items-center justify-center border border-primary/30 shadow-[0_0_10px_rgba(108,99,255,0.2)]">
                    <iconify-icon icon="lucide:sparkles" class="text-primary"></iconify-icon>
                </div>
                <div class="flex-1">
                    <h4 class="font-medium text-sm text-primary">Acapella_Verse_Gen.wav</h4>
                    <p class="text-xs text-muted-foreground font-mono mt-0.5">Generated • 1.8 MB</p>
                </div>
                <button class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center hover:bg-primary hover:text-primary-foreground transition-colors">
                    <iconify-icon icon="lucide:play" class="ml-0.5"></iconify-icon>
                </button>
            </div>

            <!-- Item 3 (Downloading) -->
            <div class="flex items-center gap-3 p-3 bg-muted/30 border border-transparent rounded-lg opacity-80">
                <div class="w-10 h-10 rounded bg-card flex items-center justify-center border border-border relative">
                    <iconify-icon icon="lucide:loader" class="text-secondary animate-spin"></iconify-icon>
                </div>
                <div class="flex-1">
                    <h4 class="font-medium text-sm">Synth_Bass_Jailbreak.wav</h4>
                    <div class="flex items-center gap-2 mt-1">
                        <div class="flex-1 bg-input rounded-full h-1.5 overflow-hidden">
                            <div class="bg-secondary h-full w-3/4 rounded-full shadow-[0_0_5px_rgba(0,245,255,0.8)]"></div>
                        </div>
                        <span class="text-[10px] font-mono text-muted-foreground w-6 text-right">75%</span>
                    </div>
                </div>
                <button class="w-8 h-8 rounded-full text-muted-foreground flex items-center justify-center hover:text-destructive transition-colors">
                    <iconify-icon icon="lucide:x"></iconify-icon>
                </button>
            </div>
            
            <!-- Item 4 (Downloaded) -->
            <div class="flex items-center gap-3 p-3 bg-muted/30 hover:bg-muted/50 border border-transparent hover:border-border rounded-lg transition-colors cursor-pointer group">
                <div class="w-10 h-10 rounded bg-card flex items-center justify-center border border-border">
                    <iconify-icon icon="lucide:arrow-down-circle" class="text-muted-foreground group-hover:text-secondary transition-colors"></iconify-icon>
                </div>
                <div class="flex-1">
                    <h4 class="font-medium text-sm">Drum_Loop_120bpm.mp3</h4>
                    <p class="text-xs text-muted-foreground font-mono mt-0.5">Downloaded • 1.1 MB</p>
                </div>
                <button class="w-8 h-8 rounded-full bg-primary/10 text-primary flex items-center justify-center hover:bg-primary hover:text-primary-foreground transition-colors">
                    <iconify-icon icon="lucide:play" class="ml-0.5"></iconify-icon>
                </button>
            </div>
        </div>

    </main>

    <!-- Bottom Nav -->
    <nav class="absolute bottom-0 left-0 right-0 bg-card/95 backdrop-blur border-t border-border flex justify-around py-3 px-2 pb-6 z-30">
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:sparkles" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">IA</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:headphones" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">Audio</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16 relative">
            <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-8 h-1 bg-muted-foreground/30 rounded-full"></div>
            <iconify-icon icon="lucide:layers" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">Formules</span>
        </button>
    </nav>
</div>
</body></html>
