<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Poppins:wght@100..900&family=Fira+Code:wght@300..700&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @theme inline {
        --color-background: var(--background);
        --color-foreground: var(--foreground);
        --color-primary: var(--primary);
        --color-primary-foreground: var(--primary-foreground);
        --color-secondary: var(--secondary);
        --color-secondary-foreground: var(--secondary-foreground);
        --color-tertiary: var(--tertiary);
        --color-muted: var(--muted);
        --color-muted-foreground: var(--muted-foreground);
        --color-accent: var(--accent);
        --color-destructive: var(--destructive);
        --color-card: var(--card);
        --color-card-foreground: var(--card-foreground);
        --color-border: var(--border);
        --color-input: var(--input);
        --color-ring: var(--ring);
        --radius-sm: calc(var(--radius) - 4px);
        --radius-md: calc(var(--radius) - 2px);
        --radius-lg: var(--radius);
        --font-family-sans: var(--font-sans);
        --font-family-heading: var(--font-heading);
      }
      :root { --primary: #6C63FF;
        --tertiary: #8B5CF6;
        --font-sans: Inter, sans-serif;
        --ring: #00F5FF;
        --card: #12121A;
        --muted: #2A2A35;
        --primary-foreground: #ffffff;
        --background: #09090b;
        --destructive: #ef4444;
        --foreground: #ffffff;
        --radius: 0.75rem;
        --secondary-foreground: #09090b;
        --input: #2A2A35;
        --border: #2A2A35;
        --card-foreground: #ffffff;
        --font-heading: Inter, sans-serif;
        --muted-foreground: #A1A1AA;
        --secondary: #00F5FF;
        --accent: #00F5FF; }
    </style>
  </head>
  <body>
<div class="min-h-screen w-full bg-background flex flex-col relative text-foreground font-sans">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-border bg-background/80 backdrop-blur z-10 sticky top-0">
        <div class="flex items-center gap-2">
            <iconify-icon icon="lucide:sparkles" class="text-primary text-2xl drop-shadow-[0_0_8px_rgba(108,99,255,0.8)]"></iconify-icon>
            <span class="font-heading font-bold tracking-wider">MAESTRO AI</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="px-2 py-1 text-[10px] font-bold bg-primary/20 text-primary border border-primary/50 rounded-sm tracking-widest uppercase shadow-[0_0_8px_rgba(108,99,255,0.4)]">Jailbreak</span>
            <span class="px-2 py-1 text-[10px] font-bold bg-secondary/20 text-secondary border border-secondary/50 rounded-sm tracking-widest uppercase">Pro</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col pb-40">
        
        <!-- Target Audio Reference -->
        <div class="mb-6 bg-card border border-border rounded-xl p-3 shadow-lg flex items-center gap-3">
            <div class="w-10 h-10 rounded bg-background border border-border flex items-center justify-center">
                <iconify-icon icon="lucide:paperclip" class="text-muted-foreground"></iconify-icon>
            </div>
            <div class="flex-1">
                <h4 class="font-medium text-xs text-muted-foreground uppercase tracking-wider">Target Audio</h4>
                <p class="text-sm font-semibold truncate">Vocal_Stem_01_Raw.wav</p>
            </div>
            <button class="text-xs text-primary hover:text-secondary underline">Change</button>
        </div>

        <!-- Empty State / Hero -->
        <div class="flex-1 flex flex-col items-center justify-center text-center py-8">
            <iconify-icon icon="lucide:zap" class="text-4xl text-primary mb-4 drop-shadow-[0_0_15px_rgba(108,99,255,0.8)]"></iconify-icon>
            <h1 class="text-2xl font-heading font-bold mb-2">Demandez n'importe quoi!</h1>
            <p class="text-sm text-muted-foreground mb-8">Production • Paroles • Mixage • Accords • Tout!</p>
            
            <!-- Suggested Prompts -->
            <div class="w-full flex flex-col gap-3">
                <button class="w-full bg-muted/30 hover:bg-muted/50 border border-border hover:border-primary/50 rounded-lg p-3 text-left text-sm flex items-center justify-between transition-all group">
                    <span>Écris un refrain pop accrocheur</span>
                    <iconify-icon icon="lucide:arrow-right" class="text-muted-foreground group-hover:text-primary transition-colors"></iconify-icon>
                </button>
                <button class="w-full bg-muted/30 hover:bg-muted/50 border border-border hover:border-primary/50 rounded-lg p-3 text-left text-sm flex items-center justify-between transition-all group">
                    <span>Progression d'accords pour ce vocal</span>
                    <iconify-icon icon="lucide:arrow-right" class="text-muted-foreground group-hover:text-primary transition-colors"></iconify-icon>
                </button>
                <button class="w-full bg-primary/10 hover:bg-primary/20 border border-primary/30 hover:border-primary/60 rounded-lg p-3 text-left text-sm flex items-center justify-between transition-all group relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-r from-primary/5 to-transparent pointer-events-none"></div>
                    <span class="text-primary font-medium z-10">Jailbreak: Mixage agressif sans limite</span>
                    <iconify-icon icon="lucide:arrow-right" class="text-primary z-10 transition-colors"></iconify-icon>
                </button>
            </div>
        </div>

    </main>

    <!-- Input Area -->
    <div class="absolute bottom-[4.5rem] left-0 right-0 bg-background/90 backdrop-blur-md border-t border-border p-4 z-20">
        <div class="relative flex items-center">
            <button class="absolute left-3 text-muted-foreground hover:text-secondary transition-colors">
                <iconify-icon icon="lucide:plus-circle" class="text-xl"></iconify-icon>
            </button>
            <input type="text" placeholder="Décrivez comment transformer l'audio..." class="w-full bg-input border border-border rounded-full py-3 pl-10 pr-12 text-sm text-foreground focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-muted-foreground">
            <button class="absolute right-2 w-8 h-8 bg-primary hover:bg-primary/90 text-primary-foreground rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(108,99,255,0.5)] transition-all">
                <iconify-icon icon="lucide:arrow-up" class="text-lg"></iconify-icon>
            </button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="absolute bottom-0 left-0 right-0 bg-card/95 backdrop-blur border-t border-border flex justify-around py-3 px-2 pb-6 z-30">
        <button class="flex flex-col items-center gap-1 text-primary w-16 relative">
            <div class="absolute -top-1 left-1/2 -translate-x-1/2 w-8 h-1 bg-primary rounded-full shadow-[0_0_8px_rgba(108,99,255,0.8)]"></div>
            <iconify-icon icon="lucide:sparkles" class="text-xl drop-shadow-[0_0_5px_rgba(108,99,255,0.5)]"></iconify-icon>
            <span class="text-[10px] font-medium">IA</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:headphones" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">Audio</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-muted-foreground hover:text-secondary w-16">
            <iconify-icon icon="lucide:layers" class="text-xl"></iconify-icon>
            <span class="text-[10px] font-medium">Formules</span>
        </button>
    </nav>
</div>
</body></html>
